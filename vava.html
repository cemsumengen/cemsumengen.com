<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>VavaCars Cepte — Uygulamayı İndir</title>

  <script>
    var APP_STORE_URL  = "https://apps.apple.com/tr/app/vavacars-cepte/id6759321045?l=tr";
    var PLAY_STORE_URL = "https://play.google.com/store/apps/details?id=com.vavacars.c2bdigital";

    (function () {
      var ua = navigator.userAgent || navigator.vendor || window.opera || "";

      var isAndroid = /android/i.test(ua);
      // iPadOS 13+ reports itself as "MacIntel", so also check for touch support
      var isIOS = /iPad|iPhone|iPod/.test(ua) ||
                  (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);

      if (isAndroid) {
        window.location.replace(PLAY_STORE_URL);
      } else if (isIOS) {
        window.location.replace(APP_STORE_URL);
      }
      // Desktop / unknown devices: no redirect, fallback page below is shown
    })();
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f6f8;
      color: #1a1a2e;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
    }
    h1 { font-size: 1.5rem; margin-bottom: 8px; }
    p  { color: #5a5a6e; margin-bottom: 32px; line-height: 1.5; }
    .badges { display: flex; flex-direction: column; gap: 12px; }
    .badge {
      display: block;
      padding: 14px 20px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      color: #fff;
      transition: opacity 0.15s ease;
    }
    .badge:hover { opacity: 0.85; }
    .ios     { background: #000; }
    .android { background: #01875f; }
  </style>
</head>
<body>
  <main class="card">
    <h1>VavaCars Cepte</h1>
    <p>Uygulamayı indirmek için cihazınıza uygun mağazayı seçin.</p>
    <div class="badges">
      <a class="badge ios" href="https://apps.apple.com/tr/app/vavacars-cepte/id6759321045?l=tr">
        App Store'dan İndir
      </a>
      <a class="badge android" href="https://play.google.com/store/apps/details?id=com.vavacars.c2bdigital">
        Google Play'den İndir
      </a>
    </div>
  </main>
</body>
</html>
